<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <rect width="800" height="450" fill="#0f172a" />
  
  <defs>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#glow)">
    <path d="M 400 120
             A 100 100 0 1 0 450 133
             Q 455 125, 465 130
             Q 475 140, 480 130
             Q 490 120, 500 125
             A 100 100 0 0 0 400 120"
          fill="none" 
          stroke="url(#neonGlow)" 
          stroke-width="4" 
          stroke-linecap="round" />
          
    <circle cx="400" cy="225" r="105" fill="none" stroke="url(#neonGlow)" stroke-width="4" stroke-dasharray="660" stroke-dashoffset="100" />
  </g>
</svg>
